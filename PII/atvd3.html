<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 3</title>
</head>
<body>
    <h3>Envie uma mensagem preenchendo o formulário</h3>

    <form action="post">
    <label for="">Seu Nome:</label>
    <input type="text" name="nome" placeholder="Digite seu nome*"><br>
    <label for="">Seu Telefone:</label>
    <input type="tel" name="telefone" placeholder="Digite seu Telefone"><br>
    <label for="">Seu E-mail:</label>
    <input type="email" name="email" placeholder="Digite seu E-mail*"><br>
    <label for="">Deseja receber nossas novidades?</label>
    <input type="radio" name="novidades" value="Sim">
    <label for="">Sim</label>
    <input type="radio" name="novidades" value="Nao">
    <label for="">Não</label><br>
    <label for="">Sua mensagem:</label>
    <textarea name="mensagem" placeholder="Mensagem*" id=""></textarea><br>

    <input type="submit" value="Enviar">
    </form>
    
</body>
</html>
